<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Defenders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">

        <h1>🛡️ Cyber Defenders</h1>
        <p id="intro">
            Welcome, Defender! This short game will help you learn simple, everyday
            cyber‑security skills. No experience needed — just curiosity.
        </p>
        <button id="startBtn">Start Game</button>

        <p id="question" class="hidden"></p>
        <div id="answers"></div>

        <p id="feedback"></p>
        <button id="nextBtn" class="hidden">Next</button>

        <div id="score" class="hidden"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
